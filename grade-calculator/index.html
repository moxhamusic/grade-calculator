<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Grade Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">
    <h1>Simple Grade Calculator</h1>
    <p class="subtitle">Calculate total marks, average, and grade for 5 subjects.</p>

    <button id="startBtn" class="btn">Start Calculation</button>

    <div id="resultBox" class="result-box hidden">
      <h2>Results</h2>
      <p><strong>Subject Marks:</strong> <span id="marksList"></span></p>
      <p><strong>Total Marks:</strong> <span id="totalMarks"></span></p>
      <p><strong>Average Marks:</strong> <span id="averageMarks"></span></p>
      <p><strong>Grade:</strong> <span id="finalGrade"></span></p>
    </div>

    <footer>
      <p>Uses <code>prompt()</code> for input and <code>alert()</code> for results, as per assignment requirements.</p>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
